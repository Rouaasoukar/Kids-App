name: kids_app
description: "A fun learning app for kids to practice letters, words and sentences."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  # Riverpod: manages app state (like "current user", "score", "language")
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Navigation ---
  # go_router: handles moving between screens cleanly
  go_router: ^14.6.2

  # --- Local Storage (offline-first) ---
  # Hive: fast local database, stores profiles & progress on the device
  hive_flutter: ^1.1.0

  # --- Firebase (cloud sync) ---
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.9

  # --- Text to Speech ---
  # flutter_tts: reads letters, words and sentences aloud to the child
  flutter_tts: ^4.2.0

  # --- AI (Google Gemini) ---
  # google_generative_ai: generates age-appropriate exercises
  google_generative_ai: ^0.4.7

  # --- Animations ---
  # lottie: plays animated illustrations (avatars, celebrations)
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # --- Audio ---
  # audioplayers: plays sound effects (correct answer, level up, etc.)
  audioplayers: ^6.5.0

  # --- UI Helpers ---
  cupertino_icons: ^1.0.8
  gap: ^3.0.1               # easy spacing between widgets
  cached_network_image: ^3.4.1  # loads images efficiently
  uuid: ^4.5.1                  # generates unique IDs for profiles

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15         # code generator (needed by riverpod)
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
    - assets/data/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
