workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.1
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS (no-codesign for now)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - flutter_drive.log
      - build/ios/iphoneos/Runner.app

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
